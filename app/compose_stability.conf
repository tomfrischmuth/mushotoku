// Compose Stability Configuration
// Externe Typen, die der Compose-Compiler nicht als stabil erkennt, die aber
// tief unveränderliche Wert-Typen sind. So kann Compose strukturelle Gleichheit
// nutzen und betroffene Composables überspringen (weniger Recompositions).
//
// java.time.* sind alle immutable value types (LocalDate, LocalTime,
// LocalDateTime, YearMonth, Instant, Duration, Period, DayOfWeek, Month, …).
java.time.*
